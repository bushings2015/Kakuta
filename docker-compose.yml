services:
  db:
    image: postgres:15-alpine
    container_name: kakutausa-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kakutausa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      target: dev
    container_name: kakutausa-backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=development
      - PORT=8081
      - DATABASE_URL=postgresql://user:password@db:5432/kakutausa?schema=public
      - JWT_SECRET=your_jwt_secret
      # Add other env vars as needed from your local .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: kakutausa-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8081
    depends_on:
      - backend

volumes:
  postgres_data:
